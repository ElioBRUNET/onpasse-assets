<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width: 820px;
  height: 312px;
  overflow: hidden;
}
body {
  background: #0d0d0d;
  font-family: 'Sora', Poppins, -apple-system, BlinkMacSystemFont, sans-serif;
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<svg width="820" height="312" viewBox="0 0 820 312" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="820" height="312" fill="#0d0d0d"/>

  <!-- Grid texture -->
  <defs>
    <pattern id="grid" width="52" height="52" patternUnits="userSpaceOnUse">
      <path d="M 52 0 L 0 0 0 52" fill="none" stroke="rgba(255,255,255,0.035)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow1" cx="80%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="20%" cy="100%" r="40%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="820" height="312" fill="url(#grid)"/>
  <rect width="820" height="312" fill="url(#glow1)"/>
  <rect width="820" height="312" fill="url(#glow2)"/>

  <!-- Left accent line -->
  <rect x="64" y="80" width="3" height="152" rx="2" fill="#22c55e"/>

  <!-- Main tagline -->
  <text x="88" y="148" font-family="Sora, sans-serif" font-size="36" font-weight="800" fill="white" letter-spacing="-1">Le calculateur de</text>
  <text x="88" y="196" font-family="Sora, sans-serif" font-size="36" font-weight="800" letter-spacing="-1">
    <tspan fill="#22c55e">maturité</tspan>
    <tspan fill="white" dx="10">gymnasiale.</tspan>
  </text>

  <!-- Sub -->
  <text x="88" y="228" font-family="Sora, sans-serif" font-size="14" font-weight="400" fill="rgba(255,255,255,0.4)" letter-spacing="0.01em">Gratuit · Suisse romande · Mai–Juin 2026</text>

  <!-- Divider -->
  <line x1="540" y1="80" x2="540" y2="232" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Stat 1 -->
  <text x="608" y="148" font-family="Sora, sans-serif" font-size="48" font-weight="800" fill="#22c55e" letter-spacing="-2" text-anchor="middle">#1</text>
  <text x="608" y="172" font-family="Sora, sans-serif" font-size="12" font-weight="500" fill="rgba(255,255,255,0.45)" text-anchor="middle" letter-spacing="0.04em">GOOGLE &amp; CHATGPT</text>

  <!-- Divider 2 -->
  <line x1="690" y1="96" x2="690" y2="216" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Stat 2 -->
  <text x="752" y="148" font-family="Sora, sans-serif" font-size="42" font-weight="800" fill="white" letter-spacing="-2" text-anchor="middle">500+</text>
  <text x="752" y="172" font-family="Sora, sans-serif" font-size="12" font-weight="500" fill="rgba(255,255,255,0.45)" text-anchor="middle" letter-spacing="0.04em">ÉLÈVES EN 2025</text>

  <!-- URL pill bottom left -->
  <rect x="88" y="248" width="142" height="28" rx="14" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
  <text x="159" y="266" font-family="Sora, sans-serif" font-size="12" font-weight="700" fill="#22c55e" text-anchor="middle" letter-spacing="0.05em">onpasse.com</text>

</svg>
</body>
</html>
